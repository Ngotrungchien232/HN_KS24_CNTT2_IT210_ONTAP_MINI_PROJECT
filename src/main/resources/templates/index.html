<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title th:text="#{todo.title}">Todo App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        .error { color: red; font-size: 13px; }
        .success { background: #d4edda; color: #155724; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .danger  { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        input, select { padding: 6px; width: 100%; box-sizing: border-box; }
        button { padding: 8px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        .btn-edit   { padding: 5px 12px; background: #ffc107; color: black; text-decoration: none; border-radius: 4px; }
        .btn-delete { padding: 5px 12px; background: #dc3545; color: white; text-decoration: none; border-radius: 4px; }
        .form-group { margin-bottom: 12px; }
        label { font-weight: bold; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; }
        .lang a { margin-left: 10px; color: #4CAF50; text-decoration: none; font-size: 14px; }
        .owner { color: #555; font-size: 16px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header-bar">
    <h1> <span th:text="#{todo.title}">Danh Sách Công Việc</span></h1>
    <!-- Chuyển ngôn ngữ -->
    <div class="lang">
        <a th:href="@{/(lang='vi')}" th:text="#{lang.vi}">Tiếng Việt</a> |
        <a th:href="@{/(lang='en')}" th:text="#{lang.en}">English</a>
    </div>
</div>

<!--  Hiển thị tên chủ sở hữu từ Session -->
<p class="owner">👤 <span th:text="#{todo.owner}">Danh sách của</span>: <strong th:text="${ownerName}"></strong></p>

<!-- Flash messages -->
<div class="success" th:if="${message}" th:text="${message}"></div>
<div class="danger"  th:if="${error}"   th:text="${error}"></div>

<!-- Form thêm mới -->
<h2 th:text="#{todo.add.title}">Thêm Công Việc Mới</h2>
<form th:action="@{/add}" th:object="${newTodo}" method="post">
    <div class="form-group">
        <label th:text="#{todo.form.content}">Nội dung:</label>
        <input type="text" th:field="*{content}"/>
        <span class="error" th:errors="*{content}"></span>
    </div>
    <div class="form-group">
        <label th:text="#{todo.form.dueDate}">Ngày hết hạn:</label>
        <input type="date" th:field="*{dueDate}"/>
        <span class="error" th:errors="*{dueDate}"></span>
    </div>
    <div class="form-group">
        <label th:text="#{todo.form.status}">Trạng thái:</label>
        <select th:field="*{status}">
            <option value="TODO">TODO</option>
            <option value="DONE">DONE</option>
        </select>
    </div>
    <div class="form-group">
        <label th:text="#{todo.form.priority}">Độ ưu tiên:</label>
        <select th:field="*{priority}">
            <option value="LOW">LOW</option>
            <option value="MEDIUM">MEDIUM</option>
            <option value="HIGH">HIGH</option>
        </select>
    </div>
    <button type="submit" th:text="#{todo.btn.save}">Lưu</button>
</form>

<!-- Danh sách task -->
<h2 th:text="#{todo.list.title}">Danh Sách Task</h2>
<table>
    <thead>
    <tr>
        <th th:text="#{todo.table.id}">ID</th>
        <th th:text="#{todo.table.content}">Nội dung</th>
        <th th:text="#{todo.table.dueDate}">Ngày hết hạn</th>
        <th th:text="#{todo.table.status}">Trạng thái</th>
        <th th:text="#{todo.table.priority}">Độ ưu tiên</th>
        <th th:text="#{todo.table.action}">Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="todo : ${todos}">
        <td th:text="${todo.id}"></td>
        <td th:text="${todo.content}"></td>
        <td th:text="${todo.dueDate}"></td>
        <td th:text="${todo.status}"></td>
        <td th:text="${todo.priority}"></td>
        <td>
            <a th:href="@{/todos/edit/{id}(id=${todo.id})}" class="btn-edit" th:text="#{todo.btn.edit}">️ Sửa</a>
            &nbsp;
            <a th:href="@{/todos/delete/{id}(id=${todo.id})}"
               class="btn-delete"
               th:onclick="'return confirm(\'' + #{todo.confirm.delete} + '\')'">
                 <span th:text="#{todo.btn.delete}">Xóa</span>
            </a>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(todos)}">
        <td colspan="6" style="text-align:center; color:gray;" th:text="#{todo.empty}">Chưa có công việc nào!</td>
    </tr>
    </tbody>
</table>

</body>
</html>
