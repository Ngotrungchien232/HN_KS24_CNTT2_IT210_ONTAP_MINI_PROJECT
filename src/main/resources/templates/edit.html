<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sửa Công Việc</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        .error { color: red; font-size: 13px; }
        input, select { padding: 6px; width: 100%; box-sizing: border-box; }
        button { padding: 8px 20px; background: #ffc107; color: black; border: none; cursor: pointer; margin-right: 10px; }
        .btn-cancel { padding: 8px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; }
        .form-group { margin-bottom: 12px; }
        label { font-weight: bold; }
    </style>
</head>
<body>

<h1>️ Sửa Công Việc</h1>

<form th:action="@{/todos/update}" th:object="${todo}" method="post">

    <!--  QUAN TRỌNG: hidden ID để JPA biết đây là UPDATE chứ không phải INSERT -->
    <input type="hidden" th:field="*{id}"/>

    <div class="form-group">
        <label>Nội dung:</label>
        <input type="text" th:field="*{content}" placeholder="Nhập nội dung công việc..."/>
        <span class="error" th:errors="*{content}"></span>
    </div>

    <div class="form-group">
        <label>Ngày hết hạn:</label>
        <input type="date" th:field="*{dueDate}"/>
        <span class="error" th:errors="*{dueDate}"></span>
    </div>

    <div class="form-group">
        <label>Trạng thái:</label>
        <select th:field="*{status}">
            <option value="TODO">TODO</option>
            <option value="DONE">DONE</option>
        </select>
    </div>

    <div class="form-group">
        <label>Độ ưu tiên:</label>
        <select th:field="*{priority}">
            <option value="LOW">LOW</option>
            <option value="MEDIUM">MEDIUM</option>
            <option value="HIGH">HIGH</option>
        </select>
    </div>

    <button type="submit"> Cập nhật</button>
    <a th:href="@{/}" class="btn-cancel"> Hủy</a>

</form>

</body>
</html>
