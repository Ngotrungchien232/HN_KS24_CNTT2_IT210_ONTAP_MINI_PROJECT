<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title th:text="#{edit.title}">Sửa Công Việc</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        .error { color: red; font-size: 13px; }
        input, select { padding: 6px; width: 100%; box-sizing: border-box; }
        button { padding: 8px 20px; background: #ffc107; color: black; border: none; cursor: pointer; margin-right: 10px; }
        .btn-cancel { padding: 8px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; }
        .form-group { margin-bottom: 12px; }
        label { font-weight: bold; }
        .lang a { margin-left: 10px; color: #4CAF50; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div style="display:flex; justify-content:space-between; align-items:center;">
    <h1> <span th:text="#{edit.title}">Sửa Công Việc</span></h1>
    <div class="lang">
        <a th:href="@{/todos/edit/{id}(id=${todo.id},lang='vi')}" th:text="#{lang.vi}">Tiếng Việt</a> |
        <a th:href="@{/todos/edit/{id}(id=${todo.id},lang='en')}" th:text="#{lang.en}">English</a>
    </div>
</div>

<form th:action="@{/todos/update}" th:object="${todo}" method="post">
    <input type="hidden" th:field="*{id}"/>

    <div class="form-group">
        <label th:text="#{todo.form.content}">Nội dung:</label>
        <input type="text" th:field="*{content}"/>
        <span class="error" th:errors="*{content}"></span>
    </div>
    <div class="form-group">
        <label th:text="#{todo.form.dueDate}">Ngày hết hạn:</label>
        <input type="date" th:field="*{dueDate}"/>
        <span class="error" th:errors="*{dueDate}"></span>
    </div>
    <div class="form-group">
        <label th:text="#{todo.form.status}">Trạng thái:</label>
        <select th:field="*{status}">
            <option value="TODO">TODO</option>
            <option value="DONE">DONE</option>
        </select>
    </div>
    <div class="form-group">
        <label th:text="#{todo.form.priority}">Độ ưu tiên:</label>
        <select th:field="*{priority}">
            <option value="LOW">LOW</option>
            <option value="MEDIUM">MEDIUM</option>
            <option value="HIGH">HIGH</option>
        </select>
    </div>

    <button type="submit" th:text="#{todo.btn.update}">Cập nhật</button>
    <a th:href="@{/}" class="btn-cancel" th:text="#{todo.btn.cancel}">Hủy</a>
</form>

</body>
</html>
